<!DOCTYPE html>
<html>
<head>
<title>Monitoring</title>
</head>
<body style="text-align:center;margin-top:100px;">
<h1>DevOps Monitoring</h1>

<button onclick="check()">Check Status</button>
<p id="res"></p>

<script>
function check() {
    fetch("http://localhost:8000/status")
    .then(r => r.json())
    .then(d => document.getElementById("res").innerText = d.status)
    .catch(e => document.getElementById("res").innerText = "ERROR");
}
</script>

</body>
</html>
