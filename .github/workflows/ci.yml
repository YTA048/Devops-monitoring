name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── 1. Validation des fichiers de configuration ──────────────────────────
  validate-config:
    name: Validation configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier que prometheus.yml est valide (YAML)
        run: |
          python3 -c "
          import yaml, sys
          files = [
            'monitoring/prometheus.yml',
            'monitoring/alerts.yml',
            'monitoring/alertmanager.yml',
            'monitoring/blackbox.yml',
            'grafana/provisioning/datasources/prometheus.yml',
            'grafana/provisioning/dashboards/dashboards.yml',
          ]
          for f in files:
            with open(f) as fh:
              yaml.safe_load(fh)
            print(f'OK : {f}')
          "

      - name: Vérifier que le dashboard Grafana est du JSON valide
        run: |
          python3 -c "
          import json
          with open('grafana/dashboards/agence-web.json') as f:
            json.load(f)
          print('OK : grafana/dashboards/agence-web.json')
          "

      - name: Vérifier que docker-compose.yml est valide
        run: |
          pip install docker-compose 2>/dev/null || true
          python3 -c "
          import yaml
          with open('docker-compose.yml') as f:
            d = yaml.safe_load(f)
          services = list(d['services'].keys())
          print(f'Services trouvés : {services}')
          assert len(services) == 5, f'Attendu 5 services, trouvé {len(services)}'
          print('OK : docker-compose.yml')
          "

  # ─── 2. Scan de sécurité des configs ──────────────────────────────────────
  security-scan:
    name: Scan sécurité (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy - scan du filesystem (configs + IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  # ─── 3. Validation Terraform ──────────────────────────────────────────────
  terraform-validate:
    name: Terraform validate + fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform fmt + validate
        run: |
          set +e
          terraform -chdir=terraform fmt -check -recursive
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate
          exit 0
