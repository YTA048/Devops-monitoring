input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Conversion timestamp ISO en @timestamp Logstash
  if [time] {
    date {
      match => ["time", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Tag les erreurs
  if [level] == "ERROR" or [levelname] == "ERROR" {
    mutate { add_tag => ["error"] }
  }

  # Normalisation du champ service
  if ![service] {
    mutate { add_field => { "service" => "unknown" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{[service]}-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
