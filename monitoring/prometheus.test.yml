###############################################################################
# Prometheus TEST — Configuration de l'environnement de test
# Sites fictifs inclus pour tester les alertes SiteDown
###############################################################################

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager-test:9093

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:19090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter-test:9100']

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # Sites réels pour valider que les sondes fonctionnent
          - https://example.com
          # Site fictif pour tester l'alerte SiteDown
          - https://site-en-panne-test.xyz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter-test:9115
