###############################################################################
# Alertmanager - Configuration des notifications
#
# Quand Prometheus détecte une anomalie, il envoie l'alerte à Alertmanager.
# Alertmanager décide qui prévenir et comment.
#
# Ici : toutes les alertes → email (111562@ecole-it.com via Outlook)
###############################################################################

global:
  resolve_timeout: 5m
  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

route:
  receiver: email
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

  routes:
    - matchers:
        - severity = "critical"
      receiver: email
      repeat_interval: 30m

receivers:
  - name: email
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        send_resolved: true
        headers:
          Subject: '{{ if eq .Status "firing" }}🔴 ALERTE{{ else }}✅ RÉSOLUE{{ end }} — {{ .CommonLabels.alertname }}'
        body: |
          Alerte : {{ .CommonLabels.alertname }}
          Instance : {{ .CommonLabels.instance }}
          Sévérité : {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          Détail : {{ .Annotations.description }}
          {{ end }}
