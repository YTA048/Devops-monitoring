###############################################################################
# Alertmanager - Configuration des notifications
#
# Quand Prometheus détecte une anomalie, il envoie l'alerte à Alertmanager.
# Alertmanager décide qui prévenir et comment.
#
# Ici : alertes critiques → Discord + email
#        alertes warning  → Discord uniquement
###############################################################################

global:
  resolve_timeout: 5m

route:
  receiver: discord
  group_by: ['alertname', 'instance']
  group_wait: 30s         # attend 30s avant d'envoyer (regroupe les alertes)
  group_interval: 5m      # attend 5m avant de ré-envoyer un groupe existant
  repeat_interval: 1h     # répète l'alerte toutes les heures si pas résolue

  routes:
    # Alertes critiques : Discord + email
    - matchers:
        - severity = "critical"
      receiver: critical
      repeat_interval: 30m

receivers:

  # Notification Discord uniquement (warning)
  - name: discord
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🟡 ALERTE{{ else }}✅ RÉSOLUE{{ end }} — {{ .CommonLabels.alertname }}'
        message: |
          **Site / Instance :** {{ .CommonLabels.instance }}
          {{ range .Alerts }}**Détail :** {{ .Annotations.description }}{{ end }}

  # Notification Discord + email (critical)
  - name: critical
    discord_configs:
      - webhook_url: "${DISCORD_WEBHOOK_URL}"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴 CRITIQUE{{ else }}✅ RÉSOLUE{{ end }} — {{ .CommonLabels.alertname }}'
        message: |
          **Site / Instance :** {{ .CommonLabels.instance }}
          {{ range .Alerts }}**Détail :** {{ .Annotations.description }}{{ end }}
    email_configs:
      - to: "${ALERT_EMAIL_TO}"
        from: "${SMTP_FROM}"
        smarthost: "${SMTP_HOST}:${SMTP_PORT}"
        auth_username: "${SMTP_USER}"
        auth_password: "${SMTP_PASSWORD}"
        send_resolved: true
        headers:
          Subject: '[CRITIQUE] {{ .CommonLabels.alertname }} — {{ .CommonLabels.instance }}'
