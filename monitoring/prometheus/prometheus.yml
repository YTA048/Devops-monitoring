global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
