###############################################################################
# Kit de monitoring - Agence web
#
# Use case : surveiller les sites des clients, le serveur, et recevoir
#            des alertes quand quelque chose ne va pas.
#
# Services :
#   - blackbox-exporter  : sonde les URLs des clients (HTTP up/down + latence)
#   - node-exporter      : métriques système du serveur (CPU, RAM, disque)
#   - prometheus         : collecte et stocke toutes les métriques
#   - grafana            : dashboards visuels
#   - alertmanager       : envoie les alertes (Discord ou email)
###############################################################################

services:

  # Sonde les sites clients : fait une requête HTTP et mesure si ça répond
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks: [monitoring]

  # Expose les métriques système du serveur Linux (CPU, RAM, disque, réseau)
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"
    ports:
      - "9100:9100"
    networks: [monitoring]
    # Note Windows/macOS : node-exporter fonctionne uniquement sur Linux.
    # Sur Windows, retirer le volume /host et la commande --path.rootfs.

  # Collecte les métriques toutes les 30s en interrogeant les exporters
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - blackbox-exporter
      - node-exporter
    networks: [monitoring]

  # Visualise les métriques avec des dashboards
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks: [monitoring]

  # Reçoit les alertes de Prometheus et les envoie sur Discord ou email
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks: [monitoring]

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  monitoring:
    driver: bridge
